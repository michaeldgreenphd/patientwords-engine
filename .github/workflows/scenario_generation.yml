name: Scenario Generation (medlang-circuits)

# Generate -> archive -> trace -> compare, from the Actions tab:
#   1. Claude generates new stress pairs (patient vs. clinical wording) or
#      dialect/register variants around a fixed term (medlang-generate).
#   2. The validated output is committed to data/simulated/ as simulated data,
#      so every batch is archived even if tracing fails or is skipped.
#   3. A slice of the batch is traced on one or more Neuronpedia models
#      (hosted backend) and the per-model next-token probabilities are
#      compared on the run page.
# Secrets: ANTHROPIC_API_KEY (generation), NEURONPEDIA_API_KEY (tracing).
# Caveat: only gemma-2-2b currently produces hosted graphs (docs/cross-model.md);
# models without a registered source set trace with untagged features (NullFetcher).
#
# Two ways to start a run:
#   - workflow_dispatch from the Actions tab, parameters as form inputs;
#   - push a parameters file to .github/trigger/scenario-generation.json
#     (same keys as the dispatch inputs). This lets automation with
#     contents-write access but no actions-write scope start runs.

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What to generate"
        type: choice
        default: pairs
        options:
          - pairs
          - quadrants
          - dialects
      num:
        description: "Pairs (task=pairs) or variants (task=dialects) to accept"
        type: string
        default: "6"
      topics:
        description: "(pairs) Optional topics to steer coverage (comma-separated; spaces OK inside a topic)"
        type: string
        default: ""
      seed_pairs:
        description: "(pairs) Repo path of existing pairs used as few-shot examples + dedupe set"
        type: string
        default: "medlang_circuits/data/ci_pairs_2panel.json"
      feedback:
        description: "(pairs) Repo path of a screening-failures JSON shown to the generator as counterexamples"
        type: string
        default: ""
      phrase:
        description: "(dialects) Baseline phrase - the standard phrasing, ending at the probe boundary"
        type: string
        default: ""
      term:
        description: "(dialects) Swapped term to hold verbatim and fixed (clinical direction)"
        type: string
        default: ""
      target_token:
        description: "(dialects) Optional target token for the batch item, e.g. ' therapist'"
        type: string
        default: ""
      num_baselines:
        description: "(dialects sweep) How many measured baselines to sweep when phrase/term are empty"
        type: string
        default: "8"
      anthropic_model:
        description: "Anthropic model for generation"
        type: choice
        # default = the registered Tier B generator: an omitted model must not
        # silently produce a non-Tier-B sonnet batch (2026-07-17; the batch-13
        # trap). Supplementary sonnet sets pass claude-sonnet-5 explicitly.
        default: claude-haiku-4-5
        options:
          - claude-sonnet-5
          - claude-opus-4-8
          - claude-haiku-4-5
      max_spend:
        description: "Hard USD ceiling for generation"
        type: string
        default: "2"
      graph_models:
        description: "Neuronpedia model to trace ('all' sweeps every registry model; non-gemma models warn-and-skip until their source sets are registered)"
        type: choice
        default: gemma-2-2b
        options:
          - gemma-2-2b
          - gemma-3-4b-it
          - qwen3-4b
          - qwen3-1.7b
          - all
      trace_sample_size:
        description: "Generated items to trace per model ('0' = archive only, skip tracing)"
        type: string
        default: "2"
  push:
    paths:
      - ".github/trigger/scenario-generation.json"

permissions:
  contents: write

# One running + one pending per branch, like every other workflow here -
# these are the PAID workflows and were the only two missing the group
# (audit 2026-07-13). fire_trigger.py enforces the same discipline client-side.
concurrency:
  group: scenario-generation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with LLM extras
        run: pip install ".[llm]" -c constraints.txt

      - name: Resolve run parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_TASK: ${{ inputs.task }}
          IN_NUM: ${{ inputs.num }}
          IN_TOPICS: ${{ inputs.topics }}
          IN_SEED_PAIRS: ${{ inputs.seed_pairs }}
          IN_FEEDBACK: ${{ inputs.feedback }}
          IN_PHRASE: ${{ inputs.phrase }}
          IN_TERM: ${{ inputs.term }}
          IN_TARGET_TOKEN: ${{ inputs.target_token }}
          IN_NUM_BASELINES: ${{ inputs.num_baselines }}
          IN_ANTHROPIC_MODEL: ${{ inputs.anthropic_model }}
          IN_MAX_SPEND: ${{ inputs.max_spend }}
          IN_GRAPH_MODELS: ${{ inputs.graph_models }}
          IN_TRACE_SAMPLE_SIZE: ${{ inputs.trace_sample_size }}
        run: |
          python - <<'EOF'
          import json, os
          defaults = {
              "task": "pairs", "num": "6", "topics": "",
              "seed_pairs": "medlang_circuits/data/ci_pairs_2panel.json",
              "feedback": "",
              "phrase": "", "term": "", "target_token": "",
              "num_baselines": "8",
              "dialects": "",
              "anthropic_model": "claude-haiku-4-5", "max_spend": "2",
              "graph_models": "gemma-2-2b", "trace_sample_size": "2",
          }
          params = dict(defaults)
          if os.environ["EVENT_NAME"] == "push":
              with open(".github/trigger/scenario-generation.json", encoding="utf-8") as f:
                  overrides = json.load(f)
              params.update({k: str(v) for k, v in overrides.items() if k in defaults})
          else:
              for key in defaults:
                  value = os.environ.get("IN_" + key.upper(), "")
                  if value:
                      params[key] = value
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              for key, value in params.items():
                  out.write(f"{key}={value.replace(chr(10), ' ')}\n")
          print(json.dumps(params, indent=2))
          EOF

      - name: Generate scenarios
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK: ${{ steps.params.outputs.task }}
          NUM: ${{ steps.params.outputs.num }}
          TOPICS: ${{ steps.params.outputs.topics }}
          SEED_PAIRS: ${{ steps.params.outputs.seed_pairs }}
          FEEDBACK: ${{ steps.params.outputs.feedback }}
          PHRASE: ${{ steps.params.outputs.phrase }}
          TERM: ${{ steps.params.outputs.term }}
          TARGET_TOKEN: ${{ steps.params.outputs.target_token }}
          NUM_BASELINES: ${{ steps.params.outputs.num_baselines }}
          DIALECT_LABELS: ${{ steps.params.outputs.dialects }}
          GEN_MODEL: ${{ steps.params.outputs.anthropic_model }}
          MAX_SPEND: ${{ steps.params.outputs.max_spend }}
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          mkdir -p data/simulated
          if [ "$TASK" = "translate_corpus" ]; then
            # Full-corpus haiku translation for the at-scale recovery test
            # (owner 2026-07-14). The txcorpus_ stem never matches the
            # observational pairs_* regex, so it cannot enter confirmatory
            # populations; measured later by logits-eval, analyzed by
            # scripts/translation_scale.py. num=0 means the whole corpus.
            OUT="data/simulated/txcorpus_${STAMP}.json"
            MODE="2panel"
            ARGS=()
          elif [ "$TASK" = "pairs" ] || [ "$TASK" = "quadrants" ]; then
            if [ "$TASK" = "quadrants" ]; then
              OUT="data/simulated/quadrants_${STAMP}.json"
              MODE="4quadrant"
              # the shared seed default is the 2panel sample; quadrants seed
              # from the committed 4quadrant sample unless overridden
              if [ "$SEED_PAIRS" = "medlang_circuits/data/ci_pairs_2panel.json" ]; then
                SEED_PAIRS="medlang_circuits/data/ci_pairs_4quadrant.json"
              fi
            else
              OUT="data/simulated/pairs_${STAMP}.json"
              MODE="2panel"
            fi
            ARGS=("$TASK" -n "$NUM" --max-spend "$MAX_SPEND" --out "$OUT"
                  --seed-pairs "$SEED_PAIRS")
            if [ "$TASK" = "pairs" ] && [ -n "$FEEDBACK" ]; then
              ARGS+=(--feedback "$FEEDBACK")
            fi
            if [ -n "$TOPICS" ]; then
              # comma-separated topics keep multi-word condition areas intact;
              # a comma-free value falls back to the legacy space splitting
              if [[ "$TOPICS" == *","* ]]; then
                IFS=',' read -ra RAW_TOPICS <<< "$TOPICS"
              else
                read -ra RAW_TOPICS <<< "$TOPICS"
              fi
              TOPIC_ARGS=()
              for t in "${RAW_TOPICS[@]}"; do
                t="${t#"${t%%[![:space:]]*}"}"
                t="${t%"${t##*[![:space:]]}"}"
                [ -n "$t" ] && TOPIC_ARGS+=("$t")
              done
              if [ ${#TOPIC_ARGS[@]} -gt 0 ]; then
                ARGS+=(--topics "${TOPIC_ARGS[@]}")
              fi
            fi
          else
            OUT="data/simulated/dialects_${STAMP}.json"
            MODE="dialect"
            if [ -n "$PHRASE" ] && [ -n "$TERM" ]; then
              ARGS=(dialects --phrase "$PHRASE" --term "$TERM" -n "$NUM"
                    --held-fixed clinical --max-spend "$MAX_SPEND" --out "$OUT")
              if [ -n "$TARGET_TOKEN" ]; then
                ARGS+=(--target-token "$TARGET_TOKEN")
              fi
              if [ -n "$DIALECT_LABELS" ]; then
                # pipe-separated custom register labels (e.g. graded-colloquialism
                # ladder rungs); labels may contain spaces and commas
                IFS='|' read -ra LABELS <<< "$DIALECT_LABELS"
                ARGS+=(--dialects "${LABELS[@]}")
              fi
            else
              # sweep mode: baselines + fixed terms derive from measured pairs
              SWEEP_SEEDS="$SEED_PAIRS"
              if [ "$SWEEP_SEEDS" = "medlang_circuits/data/ci_pairs_2panel.json" ]; then
                SWEEP_SEEDS="data/measured/imported_pairs.json"
              fi
              ARGS=(dialects --seed-pairs "$SWEEP_SEEDS" --num-baselines "$NUM_BASELINES"
                    -n "$NUM" --max-spend "$MAX_SPEND" --out "$OUT")
              if [ -n "$DIALECT_LABELS" ]; then
                IFS='|' read -ra LABELS <<< "$DIALECT_LABELS"
                ARGS+=(--dialects "${LABELS[@]}")
              fi
            fi
          fi
          if [ "$TASK" = "translate_corpus" ]; then
            python scripts/translate_corpus.py --out "$OUT" --max-spend "$MAX_SPEND" \
              --model "${GEN_MODEL:-claude-haiku-4-5}" --limit "${NUM:-0}" | tee generation_report.json
          else
            if [ -n "$GEN_MODEL" ]; then
              ARGS+=(--model "$GEN_MODEL")
            fi
            medlang-generate "${ARGS[@]}" | tee generation_report.json
          fi
          REPORT="${OUT%.json}.report.json"
          COUNT=$(python -c "import json; d=json.load(open('$OUT')); \
            print(sum(len(i.get('variants',[1])) if 'variants' in i else 1 for i in d) if d else 0)")
          COST=$(python -c "import json; r=json.load(open('$REPORT')); \
            print(f\"\${r['cost_usd']:.4f} spent of the \${r['max_spend_usd']:.2f} ceiling\")")
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "## Generation (${TASK})"
            echo ""
            echo "**Cost: ${COST}** (Neuronpedia tracing below is free - account rate limits only)"
            echo ""
            echo '```json'
            cat generation_report.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit to the simulated-data archive
        run: |
          set -euo pipefail
          # Commit ONLY the batch + sidecar onto main, whichever ref this run
          # was dispatched from - code on a feature branch must not ride along.
          # F-H05 (audit 1, 2026-07-17): the COST SIDECAR lands even when the
          # run accepted 0 items - a paid run with no output still spent money,
          # and the ledger scans main. The batch file itself only lands when
          # there is one.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git worktree add ../main-archive origin/main
          mkdir -p ../main-archive/data/simulated
          cp "${{ steps.gen.outputs.report }}" ../main-archive/data/simulated/
          if [ "${{ steps.gen.outputs.count }}" != "0" ]; then
            cp "${{ steps.gen.outputs.out }}" ../main-archive/data/simulated/
          fi
          cd ../main-archive
          git add data/simulated/
          git commit -m "Archive simulated ${{ steps.params.outputs.task }} scenarios: $(basename '${{ steps.gen.outputs.report }}')"
          # A concurrent archive push can win the race (2026-07-13: emergency
          # round 2 lost its paid batch this way). An archive commit is pure
          # addition of uniquely-named files, so a rebase always applies
          # cleanly - retry instead of dying.
          pushed=0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then pushed=1; break; fi
            git fetch origin main
            git rebase origin/main
            sleep "$attempt"
          done
          if [ "$pushed" != "1" ]; then echo "::error::archive push failed after 5 attempts"; exit 1; fi
          echo "Archived ${{ steps.gen.outputs.out }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Trace on the selected Neuronpedia models
        if: ${{ steps.params.outputs.trace_sample_size != '0' && steps.gen.outputs.count != '0' }}
        env:
          NEURONPEDIA_API_KEY: ${{ secrets.NEURONPEDIA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUT: ${{ steps.gen.outputs.out }}
          MODE: ${{ steps.gen.outputs.mode }}
          N: ${{ steps.params.outputs.trace_sample_size }}
          MODELS: ${{ steps.params.outputs.graph_models }}
        run: |
          set -uo pipefail
          python - <<'EOF'
          import json, os
          items = json.load(open(os.environ["OUT"], encoding="utf-8"))
          n = int(os.environ["N"])
          with open("trace_slice.json", "w", encoding="utf-8") as f:
              json.dump(items[:n], f, indent=2)
          print(f"Tracing {len(items[:n])} of {len(items)} generated items")
          EOF
          if [ "$MODELS" = "all" ]; then
            MODELS="gemma-2-2b gemma-3-4b-it qwen3-4b qwen3-1.7b"
          fi
          FAILED=""
          for M in $MODELS; do
            echo "::group::Tracing on $M"
            if ! medlang-batch-eval trace_slice.json --mode "$MODE" --backend hosted \
                --graph-model "$M" --out "trace_out/$M"; then
              echo "::warning::tracing failed for $M (non-gemma models need a registered source set)"
              FAILED="$FAILED $M"
            fi
            echo "::endgroup::"
          done
          if [ -n "$FAILED" ]; then
            echo "Tracing failed for:$FAILED" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish cross-model probability comparison
        if: ${{ always() && steps.params.outputs.trace_sample_size != '0' }}
        run: |
          python - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          def fmt(p):
              return f"{p:.2f}" if isinstance(p, (int, float)) else "—"

          summaries = sorted(Path("trace_out").glob("*/batch_summary.json"))
          if not summaries:
              print("\nNo trace summaries produced.")
              raise SystemExit(0)
          print("\n## Next-token probabilities across traced models\n")
          for path in summaries:
              s = json.loads(path.read_text(encoding="utf-8"))
              print(f"### {s['graph_model']} (mode: {s['mode']})\n")
              for r in s["results"]:
                  if s["mode"] == "dialect":
                      print(f"- pair {r['index']} · target `{r.get('target_token')}` · "
                            f"baseline {fmt(r.get('baseline_probability'))}")
                      for v in r["variants"]:
                          print(f"  - {v['dialect']}: {fmt(v.get('probability'))} "
                                f"(Δ {fmt(v.get('delta_vs_baseline'))})")
                  else:
                      probs = r.get("probabilities", {})
                      print(f"- pair {r['index']} · target `{r.get('target_token')}` · "
                            f"clinical {fmt(probs.get('clinical'))} / patient {fmt(probs.get('patient'))} "
                            f"(penalty {fmt(r.get('language_penalty'))})")
              print()
          EOF

      - name: Upload generated data + trace outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-generation-${{ steps.params.outputs.task }}-${{ github.run_number }}
          # This run's outputs only - zipping the whole data/simulated/ +
          # trace_out/ trees produced 4+ GB artifacts (2026-07-13) and the
          # batch must reach main via the archive step anyway.
          path: |
            ${{ steps.gen.outputs.out }}
            ${{ steps.gen.outputs.report }}
            generation_report.json
          if-no-files-found: warn
