name: Circuit Trace Evaluation (medlang-circuits)

# Benchmarks the TRACED model (hosted attribution-graph generation) - the
# companion Model Evaluation workflow benchmarks the Anthropic translation
# models instead. Hosted generation takes minutes per graph, so keep
# sample_size tiny for CI runs.
#
# Two ways to start a run:
#   - workflow_dispatch from the Actions tab, parameters as form inputs;
#   - push a parameters file to .github/trigger/circuit-trace.json (same
#     keys as the dispatch inputs). This lets automation with contents-write
#     access but no actions-write scope start runs, and chains chunked runs
#     (pairs_file + offset + sample_size) over one batch with global output
#     numbering and per-chunk committed checkpoints.

on:
  workflow_dispatch:
    inputs:
      graph_model:
        description: "Model to trace (hosted graph generation; non-gemma models need a source-set default registered first)"
        type: choice
        default: gemma-2-2b
        options:
          - gemma-2-2b
          - gemma-3-4b-it
          - qwen3-4b
          - qwen3-1.7b
      mode:
        description: "Visualization mode (selects the committed sample pairs file)"
        type: choice
        default: 2panel
        options:
          - 2panel
          - 4quadrant
          - translation
          - dialect
      pairs_file:
        description: "Repo path of the pairs JSON to trace (empty = the committed ci_pairs sample for the mode)"
        type: string
        default: ""
      offset:
        description: "Pairs to skip before tracing (chunked runs; output numbering stays global via --start-index)"
        type: string
        default: "0"
      commit_outputs:
        description: "Commit index_NN.html/png + the summary part back to the dispatched branch (checkpointing)"
        type: boolean
        default: false
      max_n_logits:
        description: "Salient logits to trace (int 5-15)"
        type: string
        default: "10"
      desired_logit_prob:
        description: "Cumulative logit probability to cover (0.6-0.99)"
        type: string
        default: "0.95"
      node_threshold:
        description: "Node pruning threshold (0.5-0.95)"
        type: string
        default: "0.8"
      edge_threshold:
        description: "Edge pruning threshold (0.65-0.98)"
        type: string
        default: "0.98"
      max_feature_nodes:
        description: "Feature node cap (int 1500-10000)"
        type: string
        default: "5000"
      sample_size:
        description: "Pairs to trace (hosted generation takes minutes per graph)"
        type: string
        default: "1"
  push:
    paths:
      - ".github/trigger/circuit-trace.json"

permissions:
  contents: write

# Chunked runs commit checkpoints to the same branch; never run two at once.
concurrency:
  group: circuit-trace-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with LLM extras
        run: pip install ".[llm]"

      - name: Resolve run parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_GRAPH_MODEL: ${{ inputs.graph_model }}
          IN_MODE: ${{ inputs.mode }}
          IN_PAIRS_FILE: ${{ inputs.pairs_file }}
          IN_OFFSET: ${{ inputs.offset }}
          IN_COMMIT_OUTPUTS: ${{ inputs.commit_outputs }}
          IN_MAX_N_LOGITS: ${{ inputs.max_n_logits }}
          IN_DESIRED_LOGIT_PROB: ${{ inputs.desired_logit_prob }}
          IN_NODE_THRESHOLD: ${{ inputs.node_threshold }}
          IN_EDGE_THRESHOLD: ${{ inputs.edge_threshold }}
          IN_MAX_FEATURE_NODES: ${{ inputs.max_feature_nodes }}
          IN_SAMPLE_SIZE: ${{ inputs.sample_size }}
        run: |
          python - <<'EOF'
          import json, os
          defaults = {
              "graph_model": "gemma-2-2b", "mode": "2panel",
              "pairs_file": "", "offset": "0", "commit_outputs": "false",
              "max_n_logits": "10", "desired_logit_prob": "0.95",
              "node_threshold": "0.8", "edge_threshold": "0.98",
              "max_feature_nodes": "5000", "sample_size": "1",
          }
          params = dict(defaults)
          if os.environ["EVENT_NAME"] == "push":
              with open(".github/trigger/circuit-trace.json", encoding="utf-8") as f:
                  overrides = json.load(f)
              params.update({k: str(v).lower() if isinstance(v, bool) else str(v)
                             for k, v in overrides.items() if k in defaults})
          else:
              for key in defaults:
                  value = os.environ.get("IN_" + key.upper(), "")
                  if value:
                      params[key] = value
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              for key, value in params.items():
                  out.write(f"{key}={value.replace(chr(10), ' ')}\n")
          print(json.dumps(params, indent=2))
          EOF

      - name: Select sample pairs
        env:
          MODE: ${{ steps.params.outputs.mode }}
          SAMPLE_SIZE: ${{ steps.params.outputs.sample_size }}
          PAIRS_FILE: ${{ steps.params.outputs.pairs_file }}
          OFFSET: ${{ steps.params.outputs.offset }}
        run: |
          python - <<'EOF'
          import json, os
          mode, n = os.environ["MODE"], int(os.environ["SAMPLE_SIZE"])
          offset = int(os.environ["OFFSET"])
          path = os.environ["PAIRS_FILE"] or f"medlang_circuits/data/ci_pairs_{mode}.json"
          with open(path, encoding="utf-8") as f:
              pairs = json.load(f)
          selected = pairs[offset:offset + n]
          if not selected:
              raise SystemExit(f"offset {offset} is past the end of {path} ({len(pairs)} pairs)")
          with open("ci_pairs.json", "w", encoding="utf-8") as f:
              json.dump(selected, f, indent=2)
          print(f"Selected pairs {offset + 1}-{offset + len(selected)} of {len(pairs)} from {path}")
          EOF

      - name: Run batch evaluation against the hosted backend
        env:
          NEURONPEDIA_API_KEY: ${{ secrets.NEURONPEDIA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # translation mode only
          OFFSET: ${{ steps.params.outputs.offset }}
        run: |
          medlang-batch-eval ci_pairs.json \
            --mode "${{ steps.params.outputs.mode }}" \
            --backend hosted \
            --graph-model "${{ steps.params.outputs.graph_model }}" \
            --max-n-logits "${{ steps.params.outputs.max_n_logits }}" \
            --desired-logit-prob "${{ steps.params.outputs.desired_logit_prob }}" \
            --node-threshold "${{ steps.params.outputs.node_threshold }}" \
            --edge-threshold "${{ steps.params.outputs.edge_threshold }}" \
            --max-feature-nodes "${{ steps.params.outputs.max_feature_nodes }}" \
            --start-index "$((OFFSET + 1))" \
            --out trace_out

      - name: Commit trace outputs to the dispatched branch
        if: ${{ always() && steps.params.outputs.commit_outputs == 'true' }}
        env:
          OFFSET: ${{ steps.params.outputs.offset }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Checkpoint whatever finished (the per-pair batch_summary.json
          # checkpointing means a timeout still leaves committed pairs). The
          # summary is renamed to a .part_NN file so chunks never clobber
          # each other; heavyweight *.tagged.json graphs stay artifact-only.
          START=$((OFFSET + 1))
          if [ -f trace_out/batch_summary.json ]; then
            mv trace_out/batch_summary.json "trace_out/batch_summary.part_$(printf '%02d' "$START").json"
          fi
          shopt -s nullglob
          FILES=(trace_out/index_*.html trace_out/index_*.png trace_out/batch_summary.part_*.json)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No trace outputs to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "${FILES[@]}"
          git commit -m "Trace outputs for pairs starting at ${START} (${{ steps.params.outputs.graph_model }}, ${{ steps.params.outputs.mode }})"
          PUSHED=0
          for i in 1 2 3; do
            if git pull --rebase origin "$BRANCH" && git push origin HEAD:"refs/heads/$BRANCH"; then
              PUSHED=1
              break
            fi
            sleep $((i * 2))
          done
          [ "$PUSHED" -eq 1 ]

      - name: Publish summary to run page
        if: always()
        run: |
          SUMMARY=$(ls trace_out/batch_summary*.json 2>/dev/null | head -1 || true)
          if [ -n "$SUMMARY" ]; then
            {
              echo "## Circuit trace batch summary (${{ steps.params.outputs.graph_model }}, ${{ steps.params.outputs.mode }})"
              echo '```json'
              cat "$SUMMARY"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload trace outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: circuit-trace-${{ steps.params.outputs.graph_model }}-${{ steps.params.outputs.mode }}-${{ github.run_number }}-offset${{ steps.params.outputs.offset }}
          path: trace_out/
          if-no-files-found: warn
