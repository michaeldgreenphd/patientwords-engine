name: Circuit Trace Evaluation (medlang-circuits)

# Benchmarks the TRACED model (hosted attribution-graph generation) - the
# companion Model Evaluation workflow benchmarks the Anthropic translation
# models instead. Hosted generation takes minutes per graph, so keep
# sample_size tiny for CI runs.

on:
  workflow_dispatch:
    inputs:
      graph_model:
        description: "Model to trace (hosted graph generation; non-gemma models need a source-set default registered first)"
        type: choice
        default: gemma-2-2b
        options:
          - gemma-2-2b
          - gemma-3-4b-it
          - qwen3-4b
          - qwen3-1.7b
      mode:
        description: "Visualization mode (selects the committed sample pairs file)"
        type: choice
        default: 2panel
        options:
          - 2panel
          - 4quadrant
          - translation
          - dialect
      max_n_logits:
        description: "Salient logits to trace (int 5-15)"
        type: string
        default: "10"
      desired_logit_prob:
        description: "Cumulative logit probability to cover (0.6-0.99)"
        type: string
        default: "0.95"
      node_threshold:
        description: "Node pruning threshold (0.5-0.95)"
        type: string
        default: "0.8"
      edge_threshold:
        description: "Edge pruning threshold (0.65-0.98)"
        type: string
        default: "0.98"
      max_feature_nodes:
        description: "Feature node cap (int 1500-10000)"
        type: string
        default: "5000"
      sample_size:
        description: "Pairs to trace (hosted generation takes minutes per graph)"
        type: string
        default: "1"

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with LLM extras
        run: pip install ".[llm]"

      - name: Select sample pairs
        env:
          MODE: ${{ inputs.mode }}
          SAMPLE_SIZE: ${{ inputs.sample_size }}
        run: |
          python - <<'EOF'
          import json, os
          mode, n = os.environ["MODE"], int(os.environ["SAMPLE_SIZE"])
          with open(f"medlang_circuits/data/ci_pairs_{mode}.json", encoding="utf-8") as f:
              pairs = json.load(f)
          with open("ci_pairs.json", "w", encoding="utf-8") as f:
              json.dump(pairs[:n], f, indent=2)
          print(f"Selected {len(pairs[:n])} of {len(pairs)} committed {mode} pairs")
          EOF

      - name: Run batch evaluation against the hosted backend
        env:
          NEURONPEDIA_API_KEY: ${{ secrets.NEURONPEDIA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # translation mode only
        run: |
          medlang-batch-eval ci_pairs.json \
            --mode "${{ inputs.mode }}" \
            --backend hosted \
            --graph-model "${{ inputs.graph_model }}" \
            --max-n-logits "${{ inputs.max_n_logits }}" \
            --desired-logit-prob "${{ inputs.desired_logit_prob }}" \
            --node-threshold "${{ inputs.node_threshold }}" \
            --edge-threshold "${{ inputs.edge_threshold }}" \
            --max-feature-nodes "${{ inputs.max_feature_nodes }}" \
            --out trace_out

      - name: Publish summary to run page
        if: always()
        run: |
          if [ -f trace_out/batch_summary.json ]; then
            {
              echo "## Circuit trace batch summary (${{ inputs.graph_model }}, ${{ inputs.mode }})"
              echo '```json'
              cat trace_out/batch_summary.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload trace outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: circuit-trace-${{ inputs.graph_model }}-${{ inputs.mode }}-${{ github.run_number }}
          path: trace_out/
          if-no-files-found: warn
